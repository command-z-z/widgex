version = 1

[theme]
css = "style.css"

[[sources]]
id = "clock"
kind = "time"
interval_ms = 1000

[[windows]]
id = "desktop-clock"
title = "Desktop Clock"
layer = "top"
anchor = ["top", "right"]
click_through = true

[windows.margin]
top = 24
right = 24

[windows.size]
width = 220
height = 72

[[windows.widgets]]
type = "box"
direction = "column"

[[windows.widgets.children]]
type = "label"
class = ["clock-time"]
text = "{{ clock.now }}"
